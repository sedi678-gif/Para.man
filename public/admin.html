<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin panel</title>
  <script src="auth.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .tab-btn.active { background: #1d4ed8; color: #fff; }
    .chip { border: 1px solid #cbd5e1; border-radius: 9999px; padding: 2px 10px; font-size: 12px; }
  </style>
</head>
<body class="bg-slate-100 p-4">
  <main class="max-w-6xl mx-auto space-y-4">

    <!-- HEADER -->
    <section class="bg-white rounded-2xl shadow p-4">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <h1 class="text-2xl font-bold">Admin panel</h1>
        <div class="flex gap-2">
          <button id="refreshAllBtn" class="bg-slate-700 text-white rounded-lg px-3 py-2">Yenilə</button>
          <button id="logoutBtn" class="bg-red-600 text-white rounded-lg px-3 py-2">Çıxış</button>
        </div>
      </div>

      <div class="mt-4 grid md:grid-cols-3 gap-2">
        <input id="adminPhone" class="border rounded-lg p-2" placeholder="+994501112233" />
        <input id="adminPin" class="border rounded-lg p-2" placeholder="PIN" />
        <button id="adminLoginBtn" class="bg-blue-600 text-white rounded-lg p-2 font-semibold">Admin daxil ol</button>
      </div>
    </section>

    <!-- STATS -->
    <section class="bg-white rounded-2xl shadow p-4">
      <h2 class="text-lg font-bold mb-3">Ümumi məlumat</h2>
      <div class="grid sm:grid-cols-4 gap-3">
        <div class="border rounded-xl p-3 bg-slate-50">
          <div class="text-slate-500 text-sm">İstifadəçi sayı</div>
          <div id="statUsers" class="text-2xl font-bold">0</div>
        </div>
        <div class="border rounded-xl p-3 bg-slate-50">
          <div class="text-slate-500 text-sm">Aktiv user</div>
          <div id="statActiveUsers" class="text-2xl font-bold text-emerald-700">0</div>
        </div>
        <div class="border rounded-xl p-3 bg-slate-50">
          <div class="text-slate-500 text-sm">Pending yükləmə</div>
          <div id="statPendingRecharge" class="text-2xl font-bold text-amber-700">0</div>
        </div>
        <div class="border rounded-xl p-3 bg-slate-50">
          <div class="text-slate-500 text-sm">Pending çıxarış</div>
          <div id="statPendingWithdraw" class="text-2xl font-bold text-amber-700">0</div>
        </div>
      </div>
    </section>

    <!-- TABS -->
    <section class="bg-white rounded-2xl shadow p-4">
      <div class="flex flex-wrap gap-2 mb-4">
        <button class="tab-btn active px-3 py-2 rounded-lg border" data-tab="usersTab">İstifadəçilər</button>
        <button class="tab-btn px-3 py-2 rounded-lg border" data-tab="rechargeTab">Yükləmə sorğuları</button>
        <button class="tab-btn px-3 py-2 rounded-lg border" data-tab="withdrawTab">Çıxarış sorğuları</button>
        <button class="tab-btn px-3 py-2 rounded-lg border" data-tab="messagesTab">Mesajlar</button>
      </div>

      <!-- USERS TAB -->
      <div id="usersTab" class="tab-panel">
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-xl font-bold">İstifadəçilər</h3>
          <span id="usersCountChip" class="chip">0 user</span>
        </div>
        <div id="usersBox" class="space-y-3"></div>
      </div>

      <!-- RECHARGE TAB -->
      <div id="rechargeTab" class="tab-panel hidden">
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-xl font-bold">Yükləmə sorğuları</h3>
          <span id="rechargeCountChip" class="chip">0 sorğu</span>
        </div>
        <div id="rechargeRequests" class="space-y-3"></div>
      </div>

      <!-- WITHDRAW TAB -->
      <div id="withdrawTab" class="tab-panel hidden">
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-xl font-bold">Çıxarış sorğuları</h3>
          <span id="withdrawCountChip" class="chip">0 sorğu</span>
        </div>
        <div id="withdrawRequests" class="space-y-3"></div>
      </div>

      <!-- MESSAGES TAB -->
      <div id="messagesTab" class="tab-panel hidden">
        <div class="grid md:grid-cols-[300px,1fr] gap-3">
          <div class="border rounded-xl p-3 bg-slate-50">
            <div class="font-bold mb-2">Istifadeciler</div>
            <div id="msgUsers" class="space-y-2 text-sm"></div>
          </div>
          <div class="border rounded-xl p-3 bg-slate-50">
            <div class="font-bold mb-2">Chat: <span id="msgActiveUser">-</span></div>
            <div id="msgThread" class="bg-white border rounded-xl p-2 h-[360px] overflow-y-auto space-y-2"></div>
            <div class="mt-2 flex gap-2">
              <input id="msgAdminInput" class="border rounded px-3 py-2 flex-1" placeholder="Mesaj yaz..." maxlength="1000" />
              <button id="msgSendBtn" class="bg-indigo-600 text-white rounded px-4">Gonder</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <section id="profileModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
    <div class="bg-white w-full max-w-3xl rounded-2xl shadow-2xl max-h-[85vh] overflow-auto">
      <div class="sticky top-0 bg-white border-b p-4 flex items-center justify-between">
        <h3 class="text-xl font-bold">Istifadeci profili</h3>
        <button id="closeProfileModalBtn" class="px-3 py-1 rounded bg-slate-200">Bagla</button>
      </div>
      <div id="profileContent" class="p-4 text-sm text-slate-700">Yuklenir...</div>
    </div>
  </section>
  <section id="receiptModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center p-4 z-50">
    <div class="bg-white w-full max-w-3xl rounded-2xl shadow-2xl max-h-[90vh] overflow-auto">
      <div class="sticky top-0 bg-white border-b p-4 flex items-center justify-between">
        <h3 class="text-xl font-bold">Qebz sekli</h3>
        <button id="closeReceiptModalBtn" class="px-3 py-1 rounded bg-slate-200">Bagla</button>
      </div>
      <div id="receiptContent" class="p-4 text-sm text-slate-700">Yuklenir...</div>
    </div>
  </section>

  <script>
    let cacheUsers = [];
    let cacheRecharge = [];
    let cacheWithdraw = [];
    let msgUsers = [];
    let msgThread = [];
    let activeMsgUserId = "";

    function esc(v) {
      return String(v ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function money(v) {
      return "₼" + Number(v || 0).toFixed(2);
    }

    function fmtDate(iso) {
      if (!iso) return "-";
      const d = new Date(iso);
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd} ${hh}:${mi}`;
    }

    function fmtTime(iso) {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "";
      const hh = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");
      return `${hh}:${mi}`;
    }

    function setStats() {
      const totalUsers = cacheUsers.length;
      const activeUsers = cacheUsers.filter(u => !u.is_banned).length;
      const pendingRecharge = cacheRecharge.filter(r => r.status === "pending").length;
      const pendingWithdraw = cacheWithdraw.filter(r => r.status === "pending").length;

      document.getElementById("statUsers").textContent = totalUsers;
      document.getElementById("statActiveUsers").textContent = activeUsers;
      document.getElementById("statPendingRecharge").textContent = pendingRecharge;
      document.getElementById("statPendingWithdraw").textContent = pendingWithdraw;

      document.getElementById("usersCountChip").textContent = totalUsers + " user";
      document.getElementById("rechargeCountChip").textContent = cacheRecharge.length + " sorğu";
      document.getElementById("withdrawCountChip").textContent = cacheWithdraw.length + " sorğu";
    }

    function setupTabs() {
      const buttons = document.querySelectorAll(".tab-btn");
      const panels = document.querySelectorAll(".tab-panel");
      buttons.forEach(btn => {
        btn.addEventListener("click", () => {
          buttons.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");

          const id = btn.dataset.tab;
          panels.forEach(p => p.classList.add("hidden"));
          document.getElementById(id).classList.remove("hidden");
        });
      });
    }

    async function adminLoginClick() {
      try {
        const phone = document.getElementById("adminPhone").value.trim();
        const pin = document.getElementById("adminPin").value.trim();
        await adminLogin(phone, pin);
        alert("Admin daxil oldu");
        await refreshAll();
      } catch (e) {
        alert(e.message || "Xəta");
      }
    }

    async function loadUsers() {
      const token = getAdminToken();
      if (!token) return;

      const res = await fetch("/.netlify/functions/api/admin/users", {
        headers: { Authorization: "Bearer " + token }
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "User list alınmadı");

      const users = data.users || [];
      cacheUsers = users;
      const box = document.getElementById("usersBox");

      if (!users.length) {
        box.innerHTML = `<div class="text-slate-500">İstifadəçi yoxdur</div>`;
        return;
      }

      box.innerHTML = users.map(u => `
        <article class="border rounded-xl p-3 bg-slate-50">
          <div class="grid sm:grid-cols-2 gap-2 text-sm">
            <div><b>User ID:</b> ${esc(u.user_id)}</div>
            <div><b>Status:</b> ${u.is_banned ? '<span class="text-red-700 font-semibold">BANNED</span>' : '<span class="text-emerald-700 font-semibold">ACTIVE</span>'}</div>
            <div><b>Ad:</b> ${esc(u.name)}</div>
            <div><b>Telefon:</b> ${esc(u.phone)}</div>
            <div><b>Balans:</b> ${money(u.balance)}</div>
            <div><b>Referral:</b> ${esc(u.referral_code || "-")}</div>
          </div>
          <div class="mt-3">
            <button onclick="toggleBan('${esc(u.user_id)}', ${u.is_banned ? "false" : "true"})"
                    class="px-3 py-1 rounded text-white ${u.is_banned ? "bg-green-600" : "bg-red-600"}">
              ${u.is_banned ? "Unban" : "Ban"}
            </button>
            <button onclick="openUserProfile('${esc(u.user_id)}')"
                    class="px-3 py-1 rounded text-white bg-indigo-600 ml-2">
              Profile bax
            </button>
          </div>
          <div class="mt-3 border-t pt-3">
            <div class="font-semibold mb-2">Balans idareetmesi</div>
            <div class="flex flex-wrap gap-2">
              <input id="bal_${esc(u.user_id)}" type="number" step="0.01" min="0.01" placeholder="Mebleg"
                     class="border rounded px-2 py-1 w-32" />
              <input id="note_${esc(u.user_id)}" type="text" placeholder="Qeyd (opsional)"
                     class="border rounded px-2 py-1 flex-1 min-w-[180px]" />
              <button onclick="adjustBalance('${esc(u.user_id)}', 'add')" class="px-3 py-1 rounded bg-emerald-600 text-white">
                + Artir
              </button>
              <button onclick="adjustBalance('${esc(u.user_id)}', 'sub')" class="px-3 py-1 rounded bg-amber-600 text-white">
                - Azalt
              </button>
            </div>
          </div>
        </article>
      `).join("");
    }

    async function toggleBan(uid, banned) {
      try {
        const token = getAdminToken();
        const res = await fetch(`/.netlify/functions/api/admin/users/${encodeURIComponent(uid)}/ban`, {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token
          },
          body: JSON.stringify({ banned })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Ban əməliyyatı alınmadı");
        await loadUsers();
        setStats();
      } catch (e) {
        alert(e.message || "Xəta");
      }
    }

    async function adjustBalance(uid, mode) {
      try {
        const token = getAdminToken();
        if (!token) throw new Error("Admin token yoxdur");

        const amountEl = document.getElementById(`bal_${uid}`);
        const noteEl = document.getElementById(`note_${uid}`);
        const amount = Number(amountEl?.value || 0);
        const note = String(noteEl?.value || "").trim();

        if (!Number.isFinite(amount) || amount <= 0) {
          throw new Error("Meblegi duzgun daxil et");
        }

        const delta = mode === "sub" ? -amount : amount;

        const res = await fetch(`/.netlify/functions/api/admin/users/${encodeURIComponent(uid)}/balance`, {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token
          },
          body: JSON.stringify({ delta, note })
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Balans emeliyyati alinmadi");

        alert(`Balans yenilendi: ${money(data.balance)}`);
        if (amountEl) amountEl.value = "";
        if (noteEl) noteEl.value = "";
        await loadUsers();
        setStats();
      } catch (e) {
        alert(e.message || "Xeta");
      }
    }

    function renderMiniTable(title, rows, rowRenderer, emptyText) {
      if (!rows.length) {
        return `
          <div class="border rounded-xl p-3 bg-slate-50">
            <div class="font-bold mb-2">${title}</div>
            <div class="text-slate-500">${emptyText}</div>
          </div>
        `;
      }

      return `
        <div class="border rounded-xl p-3 bg-slate-50">
          <div class="font-bold mb-2">${title}</div>
          <div class="space-y-2">
            ${rows.map(rowRenderer).join("")}
          </div>
        </div>
      `;
    }

    async function openUserProfile(uid) {
      try {
        const token = getAdminToken();
        if (!token) throw new Error("Admin token yoxdur");

        const modal = document.getElementById("profileModal");
        const content = document.getElementById("profileContent");
        content.innerHTML = "Yuklenir...";
        modal.classList.remove("hidden");
        modal.classList.add("flex");

        const res = await fetch(`/.netlify/functions/api/admin/users/${encodeURIComponent(uid)}/profile`, {
          headers: { Authorization: "Bearer " + token }
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Profil alina bilmedi");

        const u = data.user || {};
        const rr = Array.isArray(data.rechargeRequests) ? data.rechargeRequests : [];
        const wr = Array.isArray(data.withdrawRequests) ? data.withdrawRequests : [];

        content.innerHTML = `
          <div class="grid sm:grid-cols-2 gap-2 mb-4">
            <div><b>User ID:</b> ${esc(u.user_id || "-")}</div>
            <div><b>Status:</b> ${u.is_banned ? "BANNED" : "ACTIVE"}</div>
            <div><b>Ad:</b> ${esc(u.name || "-")}</div>
            <div><b>Telefon:</b> ${esc(u.phone || "-")}</div>
            <div><b>Balans:</b> ${money(u.balance || 0)}</div>
            <div><b>Referral:</b> ${esc(u.referral_code || "-")}</div>
            <div><b>Davet eden:</b> ${esc(u.referred_by_user_id || "-")}</div>
            <div><b>Qeydiyyat:</b> ${fmtDate(u.created_at)}</div>
            <div class="sm:col-span-2"><b>IP:</b> ${esc(u.register_ip || "-")}</div>
          </div>

          ${renderMiniTable(
            "Son yukleme sorqulari",
            rr,
            (r) => `
              <div class="border rounded p-2 bg-white">
                <div><b>#${r.id}</b> | ${money(r.amount)} | status: ${esc(r.status)}</div>
                <div class="text-slate-500">Kanal: ${esc(r.channel || "-")} | ${fmtDate(r.created_at)}</div>
              </div>
            `,
            "Yukleme sorqusu yoxdur"
          )}

          ${renderMiniTable(
            "Son cixaris sorqulari",
            wr,
            (r) => `
              <div class="border rounded p-2 bg-white">
                <div><b>#${r.id}</b> | ${money(r.request_amount)} | status: ${esc(r.status)}</div>
                <div class="text-slate-500">Bank: ${esc(r.bank_name || "-")} | ${fmtDate(r.created_at)}</div>
              </div>
            `,
            "Cixaris sorqusu yoxdur"
          )}
        `;
      } catch (e) {
        const content = document.getElementById("profileContent");
        content.innerHTML = `<div class="text-red-600">${esc(e.message || "Xeta")}</div>`;
      }
    }

    function closeUserProfileModal() {
      const modal = document.getElementById("profileModal");
      modal.classList.add("hidden");
      modal.classList.remove("flex");
    }

    async function loadRechargeRequests() {
      const token = getAdminToken();
      if (!token) return;

      const res = await fetch("/.netlify/functions/api/admin/recharge-requests", {
        headers: { Authorization: "Bearer " + token }
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error((data.error || "Recharge sorğuları alınmadı") + ` (HTTP ${res.status})`);

      const rows = data.requests || [];
      cacheRecharge = rows;
      const box = document.getElementById("rechargeRequests");

      if (!rows.length) {
        box.innerHTML = `<div class="text-slate-500">Recharge sorğusu yoxdur</div>`;
        return;
      }

      box.innerHTML = rows.map(r => `
        <article class="border rounded-xl p-3 bg-slate-50">
          <div class="grid sm:grid-cols-2 gap-2 text-sm">
            <div><b>ID:</b> ${r.id}</div>
            <div><b>Status:</b> ${esc(r.status)}</div>
            <div><b>User:</b> ${esc(r.user_id)}</div>
            <div><b>Kanal:</b> ${esc(r.channel)}</div>
            <div><b>Seçilən məbləğ:</b> ${money(r.amount)}</div>
            <div><b>Qəbzdə məbləğ:</b> ${money(r.paid_amount)}</div>
            <div class="sm:col-span-2"><b>Yaranma:</b> ${fmtDate(r.created_at)}</div>
          </div>
          <div class="mt-3 flex gap-2 ${r.status === "pending" ? "" : "hidden"}">
            <button onclick="viewRechargeReceipt(${r.id})" class="bg-slate-700 text-white rounded px-3 py-1">Qebze bax</button>
            <button onclick="reviewRecharge(${r.id}, 'approve')" class="bg-green-600 text-white rounded px-3 py-1">Approve</button>
            <button onclick="reviewRecharge(${r.id}, 'reject')" class="bg-red-600 text-white rounded px-3 py-1">Reject</button>
          </div>
        </article>
      `).join("");
    }

    async function reviewRecharge(id, action) {
      try {
        const token = getAdminToken();
        const res = await fetch(`/.netlify/functions/api/admin/recharge-requests/${id}`, {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token
          },
          body: JSON.stringify({ action })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Recharge review alınmadı");
        alert("Yükləmə sorğusu yeniləndi");
        await loadRechargeRequests();
        await loadUsers();
        setStats();
      } catch (e) {
        alert(e.message || "Xəta");
      }
    }

    async function viewRechargeReceipt(id) {
      try {
        const token = getAdminToken();
        if (!token) throw new Error("Admin token yoxdur");

        const modal = document.getElementById("receiptModal");
        const content = document.getElementById("receiptContent");
        content.innerHTML = "Yuklenir...";
        modal.classList.remove("hidden");
        modal.classList.add("flex");

        const res = await fetch(`/.netlify/functions/api/admin/recharge-requests/${id}/receipt`, {
          headers: { Authorization: "Bearer " + token }
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Qebz yuklenmedi");

        const req = data.request || {};
        content.innerHTML = `
          <div class="mb-2 text-sm">
            <b>ID:</b> ${req.id} | <b>User:</b> ${esc(req.user_id)} | <b>Status:</b> ${esc(req.status)}
          </div>
          <img src="${esc(req.receipt_url)}" alt="Qebz" class="max-h-[70vh] w-auto rounded border mx-auto" />
        `;
      } catch (e) {
        const content = document.getElementById("receiptContent");
        content.innerHTML = `<div class="text-red-600">${esc(e.message || "Xeta")}</div>`;
      }
    }

    function closeReceiptModal() {
      const modal = document.getElementById("receiptModal");
      modal.classList.add("hidden");
      modal.classList.remove("flex");
    }

    async function loadWithdrawRequests() {
      const token = getAdminToken();
      if (!token) return;

      const res = await fetch("/.netlify/functions/api/admin/withdraw-requests", {
        headers: { Authorization: "Bearer " + token }
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Withdraw sorğuları alınmadı");

      const rows = data.requests || [];
      cacheWithdraw = rows;
      const box = document.getElementById("withdrawRequests");

      if (!rows.length) {
        box.innerHTML = `<div class="text-slate-500">Withdraw sorğusu yoxdur</div>`;
        return;
      }

      box.innerHTML = rows.map(r => `
        <article class="border rounded-xl p-3 bg-slate-50">
          <div class="grid sm:grid-cols-2 gap-2 text-sm">
            <div><b>ID:</b> ${r.id}</div>
            <div><b>Status:</b> ${esc(r.status)}</div>
            <div><b>User:</b> ${esc(r.user_id)}</div>
            <div><b>Bank:</b> ${esc(r.bank_name)}</div>
            <div><b>İstənən məbləğ:</b> ${money(r.request_amount)}</div>
            <div><b>Vergi (15%):</b> ${money(r.tax_amount)}</div>
            <div><b>Karta köçürüləcək:</b> ${money(r.payout_amount)}</div>
            <div><b>Kart:</b> ${esc(r.card_number)}</div>
            <div class="sm:col-span-2"><b>Sahib:</b> ${esc(r.card_holder)}</div>
            <div class="sm:col-span-2"><b>Yaranma:</b> ${fmtDate(r.created_at)}</div>
          </div>
          <div class="mt-3 flex gap-2 ${r.status === "pending" ? "" : "hidden"}">
            <button onclick="reviewWithdraw(${r.id}, 'approve')" class="bg-green-600 text-white rounded px-3 py-1">Approve</button>
            <button onclick="reviewWithdraw(${r.id}, 'reject')" class="bg-red-600 text-white rounded px-3 py-1">Reject</button>
          </div>
        </article>
      `).join("");
    }

    async function reviewWithdraw(id, action) {
      try {
        const token = getAdminToken();
        const res = await fetch(`/.netlify/functions/api/admin/withdraw-requests/${id}`, {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token
          },
          body: JSON.stringify({ action })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Withdraw review alınmadı");
        alert("Çıxarış sorğusu yeniləndi");
        await loadWithdrawRequests();
        await loadUsers();
        setStats();
      } catch (e) {
        alert(e.message || "Xəta");
      }
    }

    function renderMsgUsers() {
      const box = document.getElementById("msgUsers");
      if (!msgUsers.length) {
        box.innerHTML = `<div class="text-slate-500">Mesaj yoxdur</div>`;
        return;
      }

      box.innerHTML = msgUsers.map(u => `
        <button onclick="openMsgThread('${esc(u.user_id)}')" class="w-full text-left border rounded-lg p-2 ${activeMsgUserId === u.user_id ? "bg-indigo-50 border-indigo-400" : "bg-white"}">
          <div class="font-semibold">${esc(u.user_id)}</div>
          <div class="text-xs text-slate-500 truncate">${esc(u.last_message || "")}</div>
          <div class="text-[11px] text-slate-400">${fmtDate(u.last_at)}</div>
        </button>
      `).join("");
    }

    function renderMsgThread() {
      const box = document.getElementById("msgThread");
      if (!msgThread.length) {
        box.innerHTML = `<div class="text-slate-500 text-sm">Mesaj yoxdur</div>`;
        return;
      }
      box.innerHTML = msgThread.map(m => {
        const fromAdmin = m.from_user_id === "ADMIN";
        return `
          <div class="flex ${fromAdmin ? "justify-end" : "justify-start"}">
            <div class="${fromAdmin ? "bg-indigo-600 text-white" : "bg-slate-200 text-slate-800"} rounded-2xl px-3 py-2 max-w-[82%]">
              <div class="text-sm break-words">${esc(m.text)}</div>
              <div class="text-[11px] ${fromAdmin ? "text-indigo-100" : "text-slate-500"} mt-1">${fmtTime(m.created_at)}</div>
            </div>
          </div>
        `;
      }).join("");
      box.scrollTop = box.scrollHeight;
    }

    async function loadMsgUsers() {
      const token = getAdminToken();
      if (!token) return;

      const res = await fetch("/.netlify/functions/api/admin/messages/users", {
        headers: { Authorization: "Bearer " + token }
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Mesaj user list alinmadi");
      msgUsers = data.users || [];
      renderMsgUsers();
    }

    async function openMsgThread(uid) {
      try {
        activeMsgUserId = uid;
        document.getElementById("msgActiveUser").textContent = uid;
        renderMsgUsers();
        const token = getAdminToken();
        const res = await fetch(`/.netlify/functions/api/admin/messages/thread/${encodeURIComponent(uid)}`, {
          headers: { Authorization: "Bearer " + token }
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Mesaj thread alinmadi");
        msgThread = data.messages || [];
        renderMsgThread();
      } catch (e) {
        alert(e.message || "Xeta");
      }
    }

    async function sendAdminMessage() {
      try {
        const token = getAdminToken();
        if (!token) throw new Error("Admin token yoxdur");
        if (!activeMsgUserId) throw new Error("Istifadeci secin");

        const input = document.getElementById("msgAdminInput");
        const text = String(input.value || "").trim();
        if (!text) return;

        const res = await fetch("/.netlify/functions/api/messages/send", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token
          },
          body: JSON.stringify({ toUserId: activeMsgUserId, text })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Mesaj gonderilmedi");

        input.value = "";
        await openMsgThread(activeMsgUserId);
        await loadMsgUsers();
      } catch (e) {
        alert(e.message || "Xeta");
      }
    }

    async function refreshAll() {
      await loadUsers();
      await loadRechargeRequests();
      await loadWithdrawRequests();
      await loadMsgUsers();
      setStats();
    }

    document.getElementById("adminLoginBtn").addEventListener("click", adminLoginClick);
    document.getElementById("refreshAllBtn").addEventListener("click", () => {
      refreshAll().catch((e) => alert(e.message || "Xəta"));
    });

    document.getElementById("logoutBtn").addEventListener("click", () => {
      clearAdminToken();
      alert("Admin çıxış edildi");
      cacheUsers = [];
      cacheRecharge = [];
      cacheWithdraw = [];
      document.getElementById("usersBox").innerHTML = "";
      document.getElementById("rechargeRequests").innerHTML = "";
      document.getElementById("withdrawRequests").innerHTML = "";
      setStats();
    });
    document.getElementById("closeProfileModalBtn").addEventListener("click", closeUserProfileModal);
    document.getElementById("profileModal").addEventListener("click", (e) => {
      if (e.target.id === "profileModal") closeUserProfileModal();
    });
    document.getElementById("closeReceiptModalBtn").addEventListener("click", closeReceiptModal);
    document.getElementById("receiptModal").addEventListener("click", (e) => {
      if (e.target.id === "receiptModal") closeReceiptModal();
    });
    document.getElementById("msgSendBtn").addEventListener("click", sendAdminMessage);
    document.getElementById("msgAdminInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendAdminMessage();
    });

    setupTabs();

    // token varsa avtomatik yüklə
    if (getAdminToken()) {
      refreshAll().catch((e) => alert(e.message || "Xəta"));
    }
  </script>
</body>
</html>
