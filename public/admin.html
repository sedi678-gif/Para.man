<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para.man | Admin</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#111a2e;
      --card:#17233d;
      --text:#e7eefc;
      --muted:#9db0d1;
      --accent:#4ea1ff;
      --ok:#25c281;
      --danger:#ff5d5d;
      --border:#263656;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:18px;
    }
    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }
    .title{font-size:1.35rem;font-weight:700}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{
      border:none;
      border-radius:10px;
      padding:10px 14px;
      cursor:pointer;
      font-weight:700;
    }
    .btn-refresh{background:var(--accent);color:#041222}
    .btn-reset{background:var(--danger);color:#fff}
    .btn-home{background:#2a3758;color:var(--text);text-decoration:none;display:inline-flex;align-items:center}
    .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:12px;
      margin-bottom:14px;
    }
    .stat{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
    }
    .stat .k{color:var(--muted);font-size:.92rem}
    .stat .v{font-size:1.1rem;font-weight:700;margin-top:4px}
    .panel{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:12px;
      padding:14px;
    }
    table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
      overflow:hidden;
    }
    th,td{
      border-bottom:1px solid var(--border);
      text-align:left;
      padding:10px 8px;
      font-size:.95rem;
      vertical-align:top;
    }
    th{color:var(--muted);font-weight:600}
    .muted{color:var(--muted)}
    .badge{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      font-size:.8rem;
      font-weight:700;
      background:#2a3758;
    }
    .ok{background:rgba(37,194,129,.16);color:#7df0c0}
    .warn{background:rgba(255,176,32,.16);color:#ffd18a}
    .empty{
      margin-top:10px;
      color:var(--muted);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div class="title">Admin panel</div>
      <div class="actions">
        <button class="btn btn-refresh" id="refreshBtn">Yenilə</button>
        <button class="btn btn-reset" id="resetBtn">Demo sıfırla</button>
        <a class="btn btn-home" href="./home.html">Ana səhifə</a>
      </div>
    </div>

    <section class="stats">
      <article class="stat">
        <div class="k">İstifadəçi sayı</div>
        <div class="v" id="userCount">1</div>
      </article>
      <article class="stat">
        <div class="k">Balans</div>
        <div class="v" id="balanceStat">₼0.00</div>
      </article>
      <article class="stat">
        <div class="k">Alınan paket sayı</div>
        <div class="v" id="pkgCount">0</div>
      </article>
      <article class="stat">
        <div class="k">Status</div>
        <div class="v"><span class="badge ok">Aktiv</span></div>
      </article>
    </section>

    <section class="panel">
      <h3 style="margin:0;">İstifadəçi məlumatı (demo)</h3>
      <p class="muted" style="margin:8px 0 0;">
        Bu versiyada məlumatlar <code>localStorage</code>-dan oxunur.
      </p>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Ad</th>
            <th>Telefon</th>
            <th>Balans</th>
            <th>Alınan paketlər</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="userTableBody"></tbody>
      </table>

      <div id="emptyText" class="empty" style="display:none;">
        Hələ paket alınmayıb.
      </div>
    </section>
  </main>

  <script>
    (function () {
      const BALANCE_KEY = "pm_balance";
      const PURCHASED_KEY = "pm_purchased";
      const USER_KEY = "pm_user";

      const balanceStat = document.getElementById("balanceStat");
      const pkgCount = document.getElementById("pkgCount");
      const userCount = document.getElementById("userCount");
      const userTableBody = document.getElementById("userTableBody");
      const emptyText = document.getElementById("emptyText");

      const refreshBtn = document.getElementById("refreshBtn");
      const resetBtn = document.getElementById("resetBtn");

      function money(v) {
        return "₼" + Number(v).toFixed(2);
      }

      function getBalance() {
        const n = Number(localStorage.getItem(BALANCE_KEY));
        return Number.isFinite(n) ? n : 0;
      }

      function getPurchased() {
        try {
          const arr = JSON.parse(localStorage.getItem(PURCHASED_KEY) || "[]");
          return Array.isArray(arr) ? arr : [];
        } catch {
          return [];
        }
      }

      function getUser() {
        try {
          const u = JSON.parse(localStorage.getItem(USER_KEY) || "{}");
          if (u && typeof u === "object") return u;
          return {};
        } catch {
          return {};
        }
      }

      function ensureDemoUser() {
        if (!localStorage.getItem(USER_KEY)) {
          localStorage.setItem(
            USER_KEY,
            JSON.stringify({
              id: "U-1001",
              name: "Demo User",
              phone: "0500000000",
              status: "active"
            })
          );
        }
        if (localStorage.getItem(BALANCE_KEY) === null) {
          localStorage.setItem(BALANCE_KEY, "0");
        }
        if (!localStorage.getItem(PURCHASED_KEY)) {
          localStorage.setItem(PURCHASED_KEY, "[]");
        }
      }

      function render() {
        const user = getUser();
        const balance = getBalance();
        const purchased = getPurchased();

        balanceStat.textContent = money(balance);
        pkgCount.textContent = String(purchased.length);
        userCount.textContent = "1";

        const statusBadge = user.status === "active"
          ? '<span class="badge ok">Aktiv</span>'
          : '<span class="badge warn">Passiv</span>';

        const pkgText = purchased.length
          ? purchased.join(", ")
          : "Yoxdur";

        userTableBody.innerHTML = `
          <tr>
            <td>${user.id || "U-1001"}</td>
            <td>${user.name || "Demo User"}</td>
            <td>${user.phone || "-"}</td>
            <td>${money(balance)}</td>
            <td>${pkgText}</td>
            <td>${statusBadge}</td>
          </tr>
        `;

        emptyText.style.display = purchased.length ? "none" : "block";
      }

      refreshBtn.addEventListener("click", render);

      resetBtn.addEventListener("click", function () {
        if (!confirm("Demo məlumatlarını sıfırlamaq istəyirsən?")) return;
        localStorage.setItem(BALANCE_KEY, "0");
        localStorage.setItem(PURCHASED_KEY, "[]");
        render();
        alert("Sıfırlandı.");
      });

      ensureDemoUser();
      render();
    })();
  </script>
</body>
</html>
