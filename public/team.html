<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para.man | Komanda heyeti</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="auth.js"></script>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #111827;
      --card: rgba(255, 255, 255, 0.12);
      --stroke: rgba(255, 255, 255, 0.2);
      --txt: #e2e8f0;
    }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--txt);
      padding-bottom: 16px;
      background:
        radial-gradient(900px 420px at 15% -10%, rgba(16, 185, 129, 0.23), transparent 60%),
        radial-gradient(900px 420px at 85% -10%, rgba(59, 130, 246, 0.23), transparent 60%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
    }
    .glass {
      background: var(--card);
      border: 1px solid var(--stroke);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 16px 36px rgba(2, 6, 23, 0.34);
    }
  </style>
</head>
<body>
  <main class="max-w-md mx-auto p-4">
    <header class="glass rounded-3xl p-4">
      <div class="flex items-center justify-between">
        <a href="my.html" class="text-2xl">←</a>
        <h1 class="text-xl font-black">Komanda heyeti</h1>
        <span></span>
      </div>
      <div class="mt-3 glass rounded-2xl p-3">
        Komanda olcusu: <b id="countText">0</b>
      </div>
    </header>

    <section id="list" class="mt-4 space-y-3"></section>

    <section id="empty" class="hidden mt-4 glass rounded-2xl p-4 text-slate-300 text-center">
      Komandana hele hec kim qosulmayib.
    </section>
  </main>

  <script>
    function fmtDate(iso) {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "-";
      return d.toLocaleString();
    }

    async function loadTeam() {
      const s = getSession();
      if (!s?.token) {
        location.href = "index.html";
        return;
      }

      const refs = await fetchMyReferrals();
      const rows = Array.isArray(refs) ? refs : [];

      document.getElementById("countText").textContent = rows.length;

      const list = document.getElementById("list");
      const empty = document.getElementById("empty");

      if (!rows.length) {
        list.innerHTML = "";
        empty.classList.remove("hidden");
        return;
      }

      empty.classList.add("hidden");

      list.innerHTML = rows.map((r, i) => `
        <article class="glass rounded-2xl p-4">
          <div class="flex items-center justify-between">
            <h3 class="font-bold">#${i + 1} ${r.name || "Istifadeci"}</h3>
            <span class="text-xs text-slate-300">${fmtDate(r.created_at)}</span>
          </div>
          <div class="mt-2 text-sm text-slate-200">ID: ${r.user_id || "-"}</div>
          <div class="text-sm text-slate-300">Nomre: ${r.phone || "-"}</div>
        </article>
      `).join("");
    }

    loadTeam().catch(() => {
      location.href = "index.html";
    });
  </script>
</body>
</html>
