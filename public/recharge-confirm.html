<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ödəniş təsdiqi</title>
  <script src="auth.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f1f3f7; }
    .grad { background: linear-gradient(90deg, #5f7cf7 0%, #7a38b8 100%); }
  </style>
</head>
<body class="min-h-screen">
  <main class="max-w-md mx-auto p-4 space-y-4">
    <section class="grad text-white rounded-2xl p-5 text-center shadow">
      <p class="opacity-90 mb-1">Sifariş məbləği:</p>
      <div class="text-5xl font-extrabold mb-2" id="orderAmount">AZN 0.0</div>
      <p class="text-sm opacity-90">⏱ Time Left <span id="timer">13:04</span></p>
    </section>

    <section class="bg-white rounded-2xl p-4 shadow">
      <h2 class="text-2xl font-bold mb-3">💳 Bank məlumatı:</h2>
      <hr class="mb-3" />
      <label class="text-sm text-slate-600">🏦 Bank adı:</label>
      <input id="bankName" class="w-full border rounded-lg p-2 bg-slate-50 mb-2" value="Kapital" readonly />
      <label class="text-sm text-slate-600">💳 Kart nömrəsi:</label>
      <input id="cardNo" class="w-full border rounded-lg p-2 bg-slate-50 mb-2" value="4449 9451 0247 5669" readonly />
      <label class="text-sm text-slate-600">👤 Kart sahibi:</label>
      <input id="cardHolder" class="w-full border rounded-lg p-2 bg-slate-50" value="R... A..." readonly />
    </section>

    <section class="bg-white rounded-2xl p-4 shadow">
      <h2 class="text-2xl font-bold mb-3">💵 Ödəniş məlumatı:</h2>
      <hr class="mb-3" />

      <label class="text-sm text-slate-600">Qəbzdə ödənən məbləğ</label>
      <input id="paidAmount" type="number" min="1" step="0.01" class="w-full border rounded-lg p-2 mb-3" placeholder="Məs: 10" />

      <label class="text-sm text-slate-600">Ödəniş qəbzi (şəkil)</label>
      <input id="receiptInput" type="file" accept="image/*" class="w-full border rounded-lg p-2 mb-2" />
      <img id="preview" class="hidden mt-2 max-h-56 rounded" alt="preview" />
    </section>

    <button id="paidBtn" class="w-full grad text-white rounded-xl py-3 text-2xl font-bold shadow">
      ✔ Ödənişi etdim
    </button>
  </main>

  <script>
    const pending = JSON.parse(localStorage.getItem("pm_pending_recharge") || "{}");
    const amount = Number(pending.amount || 0);
    const channel = pending.channel || "payment-1";
    document.getElementById("orderAmount").textContent = "AZN " + amount.toFixed(1);
    document.getElementById("paidAmount").value = amount ? amount.toFixed(2) : "";

    let sec = 13 * 60 + 4;
    const timerEl = document.getElementById("timer");
    const timer = setInterval(() => {
      sec--;
      if (sec < 0) {
        clearInterval(timer);
        timerEl.textContent = "00:00";
        return;
      }
      const m = String(Math.floor(sec / 60)).padStart(2, "0");
      const s = String(sec % 60).padStart(2, "0");
      timerEl.textContent = `${m}:${s}`;
    }, 1000);

    const input = document.getElementById("receiptInput");
    const preview = document.getElementById("preview");
    input.addEventListener("change", () => {
      const file = input.files?.[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      preview.src = url;
      preview.classList.remove("hidden");
    });

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    document.getElementById("paidBtn").addEventListener("click", async () => {
      try {
        const s = getSession();
        if (!s?.token) throw new Error("Sessiya yoxdur");

        if (!amount || amount < 10) throw new Error("Secilen mebleg tapilmadi");

        const paidAmount = Number(document.getElementById("paidAmount").value || 0);
        if (paidAmount <= 0) throw new Error("Qebzdeki meblegi daxil edin");

        const file = input.files?.[0];
        if (!file) throw new Error("Qebz sekli secin");

        const receiptUrl = await fileToDataUrl(file);

        const res = await fetch("/.netlify/functions/api/recharge/request", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + s.token
          },
          body: JSON.stringify({
            amount,
            paidAmount,
            channel,
            receiptUrl
          })
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Sorqu gonderilmedi");

        localStorage.removeItem("pm_pending_recharge");
        alert("Ödəniş sorğusu göndərildi. Admin təsdiqindən sonra balans artacaq.");
        location.href = "recharge-history.html";
      } catch (e) {
        alert(e.message || "Xeta");
      }
    });
  </script>
</body>
</html>
