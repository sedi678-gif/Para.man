<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para.man | Çıxarış</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="auth.js"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4">
  <main class="max-w-md mx-auto bg-white rounded-2xl p-5 shadow">
    <h1 class="text-2xl font-bold mb-3">Balansdan çıxarış</h1>
    <p id="balanceText" class="mb-3 text-slate-700">Balans: ₼0.00</p>

    <input id="amount" type="number" min="1" class="w-full border rounded-xl p-3 mb-4" placeholder="Məbləğ" />

    <button id="withdrawBtn" class="w-full bg-blue-600 text-white rounded-xl py-3 font-semibold mb-2">
      Çıxar
    </button>

    <a href="withdraw-history.html" class="block text-center text-blue-600 mb-2">Çıxarış qeydləri</a>
    <a href="my.html" class="block text-center text-slate-600">Geri</a>
  </main>

  <script>
    function money(v) { return "₼" + Number(v || 0).toFixed(2); }

    function saveWithdrawHistory(amount, status = "Gözləyir") {
      const key = "pm_withdraw_history";
      let arr = [];
      try { arr = JSON.parse(localStorage.getItem(key) || "[]"); } catch {}
      arr.unshift({
        amount: Number(amount || 0),
        status,
        createdAt: new Date().toISOString()
      });
      localStorage.setItem(key, JSON.stringify(arr.slice(0, 100)));
    }

    async function init() {
      const s = getSession();
      if (!s?.token) return location.href = "index.html";
      const me = await fetchMe();
      document.getElementById("balanceText").textContent = `Balans: ${money(me.balance)}`;
    }

    document.getElementById("withdrawBtn").addEventListener("click", async () => {
      try {
        const amount = Number(document.getElementById("amount").value || 0);
        if (amount <= 0) throw new Error("Düzgün məbləğ daxil edin");

        const newBal = await withdrawBalance(amount);
        saveWithdrawHistory(amount, "Gözləyir");

        alert(`Çıxarış sorğusu yaradıldı: ${money(amount)}\nYeni balans: ${money(newBal)}`);
        location.href = "withdraw-history.html";
      } catch (e) {
        alert(e.message || "Xəta baş verdi");
      }
    });

    init().catch(() => location.href = "index.html");
  </script>
</body>
</html>
