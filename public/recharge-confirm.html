<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ödəniş təsdiqi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f1f3f7; }
    .grad { background: linear-gradient(90deg, #5f7cf7 0%, #7a38b8 100%); }
  </style>
</head>
<body class="min-h-screen">
  <main class="max-w-md mx-auto p-4 space-y-4">
    <section class="grad text-white rounded-2xl p-5 text-center shadow">
      <p class="opacity-90 mb-1">Sifariş məbləği:</p>
      <div class="text-5xl font-extrabold mb-2" id="orderAmount">AZN 0.0</div>
      <p class="text-sm opacity-90">⏱ Time Left <span id="timer">13:04</span></p>
    </section>

    <section class="bg-white rounded-2xl p-4 shadow">
      <h2 class="text-2xl font-bold mb-3">💳 Bank məlumatı:</h2>
      <hr class="mb-3" />

      <label class="text-sm text-slate-600">🏦 Bank adı:</label>
      <div class="flex mb-3">
        <input id="bankName" class="flex-1 border rounded-l-lg p-2 bg-slate-50" value="Kapital" readonly />
        <button class="px-3 bg-indigo-500 text-white rounded-r-lg" onclick="copyText('bankName')">📋</button>
      </div>

      <label class="text-sm text-slate-600">💳 Kart nömrəsi:</label>
      <div class="flex mb-3">
        <input id="cardNo" class="flex-1 border rounded-l-lg p-2 bg-slate-50" value="4169 7388 3062 3967" readonly />
        <button class="px-3 bg-indigo-500 text-white rounded-r-lg" onclick="copyText('cardNo')">📋</button>
      </div>

      <label class="text-sm text-slate-600">👤 Kart sahibi:</label>
      <div class="flex">
        <input id="cardHolder" class="flex-1 border rounded-l-lg p-2 bg-slate-50" value="Elekberov Ramil" readonly />
        <button class="px-3 bg-indigo-500 text-white rounded-r-lg" onclick="copyText('cardHolder')">📋</button>
      </div>
    </section>

    <section class="bg-white rounded-2xl p-4 shadow">
      <h2 class="text-2xl font-bold mb-3">💵 Ödəniş məlumatı:</h2>
      <hr class="mb-3" />
      <p class="text-sm text-slate-600 mb-2">Ödəniş qəbzi:</p>

      <label for="receiptInput" class="block border-2 border-dashed rounded-xl p-6 text-center text-slate-500 cursor-pointer">
        <div id="dropText">Drag & drop files here ...<br />(or click to select file)</div>
        <img id="preview" class="hidden mt-3 max-h-52 mx-auto rounded" alt="preview" />
      </label>

      <input id="receiptInput" type="file" accept="image/*" class="hidden" />
      <button id="chooseBtn" class="mt-3 text-slate-700">☁ Şəkil seç</button>
    </section>

    <button id="paidBtn" class="w-full grad text-white rounded-xl py-3 text-2xl font-bold shadow">
      ✔ Ödənişi etdim
    </button>
  </main>

  <script>
    const pending = JSON.parse(localStorage.getItem("pm_pending_recharge") || "{}");
    const amount = Number(pending.amount || 0);
    document.getElementById("orderAmount").textContent = "AZN " + amount.toFixed(1);

    let sec = 13 * 60 + 4;
    const timerEl = document.getElementById("timer");
    const timer = setInterval(() => {
      sec--;
      if (sec < 0) {
        clearInterval(timer);
        timerEl.textContent = "00:00";
        return;
      }
      const m = String(Math.floor(sec / 60)).padStart(2, "0");
      const s = String(sec % 60).padStart(2, "0");
      timerEl.textContent = `${m}:${s}`;
    }, 1000);

    function copyText(id) {
      const val = document.getElementById(id).value;
      navigator.clipboard.writeText(val).then(() => alert("Kopyalandı"));
    }

    const input = document.getElementById("receiptInput");
    const chooseBtn = document.getElementById("chooseBtn");
    const preview = document.getElementById("preview");
    const dropText = document.getElementById("dropText");

    chooseBtn.addEventListener("click", () => input.click());
    input.addEventListener("change", () => {
      const file = input.files?.[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      preview.src = url;
      preview.classList.remove("hidden");
      dropText.textContent = file.name;
    });

    function saveRechargeHistory(amount, status = "Gözləyir", receiptName = "") {
      const key = "pm_recharge_history";
      let arr = [];
      try { arr = JSON.parse(localStorage.getItem(key) || "[]"); } catch {}
      arr.unshift({
        amount: Number(amount || 0),
        status,
        receiptName,
        createdAt: new Date().toISOString()
      });
      localStorage.setItem(key, JSON.stringify(arr.slice(0, 100)));
    }

    document.getElementById("paidBtn").addEventListener("click", () => {
      if (!amount || amount <= 0) {
        alert("Məbləğ tapılmadı. Yenidən yükləmə səhifəsinə qayıdın.");
        return;
      }

      const receipt = input.files?.[0];
      if (!receipt) {
        alert("Zəhmət olmasa ödəniş qəbzinin şəklini əlavə edin.");
        return;
      }

      saveRechargeHistory(amount, "Gözləyir", receipt.name);
      localStorage.removeItem("pm_pending_recharge");

      alert("Ödəniş sorğusu göndərildi. Yoxlanışdan sonra balansınıza əlavə olunacaq.");
      location.href = "recharge-history.html";
    });
  </script>
</body>
</html>
