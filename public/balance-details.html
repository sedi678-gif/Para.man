<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Balans detalları</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="auth.js"></script>
  <style>
    body { background: #eef7f3; }
  </style>
</head>
<body>
  <main class="max-w-md mx-auto min-h-screen">
    <!-- Header -->
    <header class="bg-gradient-to-r from-green-500 to-green-400 text-white px-4 py-4 flex items-center">
      <a href="my.html" class="text-3xl mr-4">←</a>
      <h1 class="text-2xl font-extrabold mx-auto pr-8">Balans detalları</h1>
    </header>

    <!-- Balance box -->
    <section class="p-4">
      <div class="bg-gradient-to-r from-green-500 to-green-400 text-white rounded-2xl px-4 py-4 shadow">
        <div class="flex items-center justify-between">
          <span class="text-xl font-semibold">Mənim balansım</span>
          <span id="balanceTop" class="text-3xl font-extrabold">₼0</span>
        </div>
      </div>
    </section>

    <!-- List -->
    <section id="list" class="px-4 pb-6 space-y-4"></section>

    <section id="empty" class="hidden text-center text-slate-500 mt-10">
      Daha çox məlumat yoxdur
    </section>
  </main>

  <script>
    function money(v) {
      return "₼" + Number(v || 0).toFixed(2);
    }

    function fmtDate(iso) {
      const d = new Date(iso);
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");
      const ss = String(d.getSeconds()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd} ${hh}:${mi}:${ss}`;
    }

    function readJson(key) {
      try { return JSON.parse(localStorage.getItem(key) || "[]"); }
      catch { return []; }
    }

    function buildRows() {
      const recharges = readJson("pm_recharge_history").map(r => ({
        title: "Yükləmə",
        amount: Number(r.amount || 0),
        sign: "+",
        date: r.createdAt || new Date().toISOString()
      }));

      const withdraws = readJson("pm_withdraw_history").map(r => ({
        title: "Çıxarış",
        amount: Number(r.amount || 0),
        sign: "-",
        date: r.createdAt || new Date().toISOString()
      }));

      const bonuses = readJson("pm_bonus_history").map(r => ({
        title: r.title || "Giriş bonusu",
        amount: Number(r.amount || 0),
        sign: "+",
        date: r.createdAt || new Date().toISOString()
      }));

      const rows = [...recharges, ...withdraws, ...bonuses];
      rows.sort((a, b) => new Date(b.date) - new Date(a.date));
      return rows;
    }

    async function init() {
      try {
        const s = getSession();
        if (!s?.token) return location.href = "index.html";

        const me = await fetchMe();
        document.getElementById("balanceTop").textContent = money(me.balance || 0);

        const rows = buildRows();
        const list = document.getElementById("list");
        const empty = document.getElementById("empty");

        if (!rows.length) {
          empty.classList.remove("hidden");
          list.innerHTML = "";
          return;
        }

        empty.classList.add("hidden");
        list.innerHTML = rows.map(row => {
          const plus = row.sign === "+";
          return `
            <article class="bg-white rounded-2xl p-4 shadow-sm flex items-center justify-between">
              <div>
                <div class="text-3xl font-semibold text-slate-800">${row.title}</div>
                <div class="text-xl text-slate-500 mt-1">${fmtDate(row.date)}</div>
              </div>
              <div class="text-4xl font-extrabold ${plus ? "text-green-500" : "text-red-500"}">
                ${plus ? "+" : "-"} ${Number(row.amount).toFixed(2)}
              </div>
            </article>
          `;
        }).join("");
      } catch (e) {
        alert(e.message || "Xəta baş verdi");
        location.href = "index.html";
      }
    }

    init();
  </script>
</body>
</html>
