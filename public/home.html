<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para.man | Ana səhifə</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="auth.js"></script>
  <style>
    body { padding-bottom: 78px; }
    .bottom-nav a.active { color: #16a34a; font-weight: 700; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">
  <main class="max-w-5xl mx-auto p-4">
    <section class="bg-white rounded-2xl shadow p-4 mb-4">
      <div class="flex flex-wrap items-center justify-between gap-2">
        <h1 class="text-xl font-bold">Ana səhifə</h1>
        <div id="balanceText" class="font-semibold">Balans: ₼0.00</div>
      </div>

      <div class="mt-3 grid grid-cols-2 sm:grid-cols-5 gap-2 text-sm">
        <a class="px-3 py-2 rounded-lg bg-emerald-600 text-white text-center" href="recharge.html">🟢 Yüklə</a>
        <a class="px-3 py-2 rounded-lg bg-blue-600 text-white text-center" href="withdraw.html">💳 Çıxar</a>
        <a class="px-3 py-2 rounded-lg bg-fuchsia-600 text-white text-center" href="service.html">🎯 Xidmət</a>
        <a class="px-3 py-2 rounded-lg bg-indigo-600 text-white text-center" href="app.html">📱 Tətbiq</a>
        <a id="adminLink" class="px-3 py-2 rounded-lg bg-slate-700 text-white text-center hidden" href="admin.html">🔐 Admin</a>
      </div>

      <div id="refBox" class="mt-3 bg-slate-800 text-white rounded-xl p-3 hidden">
        Referans kod: <b id="refCode"></b>
      </div>
    </section>

    <section id="cards" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4"></section>
  </main>

  <nav class="bottom-nav fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around py-3 z-50">
    <a href="home.html" class="active">🏠<div class="text-xs">Ana səhifə</div></a>
    <a href="products.html">🛍️<div class="text-xs">Məhsullarım</div></a>
    <a href="treasury.html">🏛️<div class="text-xs">Xəzinə</div></a>
    <a href="share.html">📣<div class="text-xs">Paylaş</div></a>
    <a href="my.html">👤<div class="text-xs">Mənim</div></a>
  </nav>

  <script>
    const packages = [
      { id: "para1", name: "Para 1", price: 50, daily: 5, total: 500, days: 100 },
      { id: "para2", name: "Para 2", price: 100, daily: 10, total: 1000, days: 100 },
      { id: "para3", name: "Para 3", price: 200, daily: 20, total: 2000, days: 100 },
      { id: "para4", name: "Para 4", price: 500, daily: 50, total: 5000, days: 100 },
      { id: "para5", name: "Para 5", price: 1000, daily: 100, total: 10000, days: 100 },
      { id: "para6", name: "Para 6", price: 2000, daily: 200, total: 20000, days: 100 }
    ];

    function money(v) { return "₼" + Number(v || 0).toFixed(2); }

    function getOwned() {
      try { return JSON.parse(localStorage.getItem("pm_owned_packages") || "[]"); }
      catch { return []; }
    }
    function setOwned(arr) {
      localStorage.setItem("pm_owned_packages", JSON.stringify(arr));
    }

    async function loadHeader() {
      const s = getSession();
      if (!s?.token) { location.href = "index.html"; return; }

      const me = await fetchMe();
      document.getElementById("balanceText").textContent = `Balans: ${money(me.balance || 0)}`;

      const refCode = me.referral_code || me.referralCode || "";
      const refBox = document.getElementById("refBox");
      const refText = document.getElementById("refCode");
      if (refCode) {
        refText.textContent = refCode;
        refBox.classList.remove("hidden");
      } else {
        refBox.classList.add("hidden");
      }

      const adminLink = document.getElementById("adminLink");
      if (me.role === "admin") adminLink.classList.remove("hidden");
      else adminLink.classList.add("hidden");
    }

    function renderCards() {
      const owned = getOwned();
      const el = document.getElementById("cards");

      el.innerHTML = packages.map(p => {
        const isOwned = owned.includes(p.id);
        return `
          <article class="bg-white rounded-2xl shadow p-4">
            <h3 class="text-lg font-bold mb-1">${p.name}</h3>
            <p class="text-sm text-slate-500">Müddət: ${p.days} gün</p>
            <p class="text-sm">Gündəlik gəlir: <b>${money(p.daily)}</b></p>
            <p class="text-sm mb-3">Ümumi gəlir: <b>${money(p.total)}</b></p>
            <button class="buyBtn w-full py-2 rounded-lg ${isOwned ? "bg-slate-300 text-slate-700" : "bg-blue-600 text-white"}"
                    data-id="${p.id}" data-price="${p.price}" ${isOwned ? "disabled" : ""}>
              ${isOwned ? "Alınıb" : "Al " + money(p.price)}
            </button>
          </article>
        `;
      }).join("");

      document.querySelectorAll(".buyBtn").forEach(btn => {
        btn.addEventListener("click", async () => {
          try {
            const pkgId = btn.dataset.id;
            const price = Number(btn.dataset.price || 0);

            const me = await fetchMe();
            const balance = Number(me.balance || 0);

            if (balance < price) {
              location.href = `recharge.html?need=${encodeURIComponent(price - balance)}&pkg=${encodeURIComponent(pkgId)}`;
              return;
            }

            const newBalance = await withdrawBalance(price);
            const arr = getOwned();
            if (!arr.includes(pkgId)) {
              arr.push(pkgId);
              setOwned(arr);
            }

            document.getElementById("balanceText").textContent = `Balans: ${money(newBalance)}`;
            alert("Paket alındı");
            renderCards();
          } catch (e) {
            alert(e.message || "Xəta");
          }
        });
      });
    }

    (async function init() {
      try {
        await loadHeader();
        renderCards();
      } catch (e) {
        alert(e.message || "Xəta");
        location.href = "index.html";
      }
    })();
  </script>
</body>
</html>
