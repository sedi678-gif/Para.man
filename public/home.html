<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para.man | Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="auth.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-b from-slate-100 to-slate-200 text-slate-800">
  <div class="max-w-md mx-auto p-4 pb-24">
    <div class="rounded-2xl p-4 bg-white/80 backdrop-blur shadow">
      <div class="flex justify-between items-start">
        <div>
          <h1 class="text-xl font-bold">Para.man</h1>
          <p id="userText" class="text-sm text-slate-600 mt-1"></p>
          <p id="balText" class="text-emerald-600 font-bold mt-2">Balans: ₼0.00</p>
        </div>
        <button onclick="logout()" class="text-sm underline">Çıxış</button>
      </div>
    </div>

    <div class="mt-4 rounded-2xl p-4 bg-white shadow">
      <h2 class="font-semibold mb-3">Menyu</h2>
      <div class="grid grid-cols-5 gap-2 text-[11px]">
        <a href="recharge.html" class="rounded-xl p-2 text-center bg-cyan-100 hover:bg-cyan-200 transition">🟢<div>Yüklə</div></a>
        <a href="withdraw.html" class="rounded-xl p-2 text-center bg-emerald-100 hover:bg-emerald-200 transition">💳<div>Çıxar</div></a>
        <a href="service.html" class="rounded-xl p-2 text-center bg-indigo-100 hover:bg-indigo-200 transition">🎯<div>Xidmət</div></a>
        <button onclick="bonus()" class="rounded-xl p-2 text-center bg-amber-100 hover:bg-amber-200 transition">✅<div>Daxil ol</div></button>
        <a href="app.html" class="rounded-xl p-2 text-center bg-violet-100 hover:bg-violet-200 transition">📱<div>Tətbiq</div></a>
      </div>
    </div>

    <div class="mt-4 rounded-2xl p-4 bg-white shadow">
      <h2 class="font-semibold">Referral</h2>
      <p class="text-sm mt-2">Kodun: <b id="refCode">-</b></p>
      <p id="refLink" class="text-xs mt-1 break-all text-slate-600"></p>
      <button onclick="copyRef()" class="mt-2 px-3 py-2 rounded-lg bg-slate-800 text-white text-sm">Linki kopyala</button>

      <h3 class="font-semibold mt-4">Dəvət etdiklərin</h3>
      <ul id="refList" class="text-sm mt-2 space-y-1"></ul>
    </div>

    <div class="mt-4">
      <a href="admin.html" class="text-sm underline text-slate-600">Admin panel</a>
    </div>
  </div>

  <script>
    function logout() {
      clearSession();
      location.href = "index.html";
    }

    async function load() {
      const s = getSession();
      if (!s?.token) return logout();

      const me = await fetchMe();
      document.getElementById("userText").textContent = `${me.name} · ${me.phone} · ${me.user_id}`;
      document.getElementById("balText").textContent = `Balans: ₼${Number(me.balance).toFixed(2)}`;
      document.getElementById("refCode").textContent = me.referral_code;

      const link = `${location.origin}/register.html?ref=${encodeURIComponent(me.referral_code)}`;
      document.getElementById("refLink").textContent = link;
      window.__refLink = link;

      const refs = await fetchMyReferrals();
      const ul = document.getElementById("refList");
      ul.innerHTML = "";
      if (!refs.length) {
        ul.innerHTML = `<li class="text-slate-500">Hələ referral yoxdur.</li>`;
      } else {
        refs.forEach(r => {
          const li = document.createElement("li");
          li.textContent = `${r.name} (${r.phone}) - ${r.user_id}`;
          ul.appendChild(li);
        });
      }
    }

    async function bonus() {
      try {
        const bal = await claimDailyBonus();
        document.getElementById("balText").textContent = `Balans: ₼${Number(bal).toFixed(2)}`;
        alert("+1 AZN əlavə olundu.");
      } catch (e) {
        alert(e.message);
      }
    }

    function copyRef() {
      if (!window.__refLink) return;
      navigator.clipboard.writeText(window.__refLink);
      alert("Referral link kopyalandı.");
    }

    load().catch((e) => {
      alert(e.message);
      logout();
    });
  </script>
</body>
</html>
