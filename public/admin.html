<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para.man | Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="auth.js"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4">
  <div class="max-w-6xl mx-auto">
    <div id="loginBox" class="bg-white rounded-2xl p-4 shadow max-w-md mx-auto">
      <h1 class="text-xl font-bold mb-2">Admin giriş</h1>
      <p id="msg" class="text-red-500 text-sm min-h-[20px]"></p>
      <input id="phone" class="w-full h-10 border rounded px-3 mb-2" placeholder="Admin telefon" />
      <input id="pin" type="password" class="w-full h-10 border rounded px-3 mb-2" placeholder="Admin PIN" />
      <button onclick="doLogin()" class="w-full h-10 rounded bg-black text-white">Daxil ol</button>
    </div>

    <div id="panel" class="hidden">
      <div class="flex justify-between items-center mb-3">
        <h2 class="text-xl font-bold">İstifadəçilər</h2>
        <div class="flex gap-2">
          <button onclick="loadUsers()" class="px-3 py-2 rounded bg-emerald-600 text-white text-sm">Yenilə</button>
          <button onclick="exitAdmin()" class="px-3 py-2 rounded bg-slate-600 text-white text-sm">Çıxış</button>
        </div>
      </div>

      <div class="overflow-auto bg-white rounded-2xl shadow">
        <table class="min-w-full text-sm">
          <thead class="bg-slate-800 text-white">
            <tr>
              <th class="p-2 text-left">ID</th>
              <th class="p-2 text-left">Ad</th>
              <th class="p-2 text-left">Telefon</th>
              <th class="p-2 text-left">Balans</th>
              <th class="p-2 text-left">Ref kod</th>
              <th class="p-2 text-left">Dəvət edən</th>
              <th class="p-2 text-left">IP</th>
              <th class="p-2 text-left">Status</th>
              <th class="p-2 text-left">Əməliyyat</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    function esc(v) { return String(v ?? "").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

    async function doLogin() {
      const msg = document.getElementById("msg");
      msg.textContent = "";
      try {
        await adminLogin(
          document.getElementById("phone").value.trim(),
          document.getElementById("pin").value.trim()
        );
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("panel").classList.remove("hidden");
        await loadUsers();
      } catch (e) {
        msg.textContent = e.message;
      }
    }

    function exitAdmin() {
      clearAdminToken();
      location.reload();
    }

    async function loadUsers() {
      const data = await adminGetUsers();
      const tbody = document.getElementById("rows");
      tbody.innerHTML = "";
      (data.users || []).forEach(u => {
        const tr = document.createElement("tr");
        tr.className = "border-b";
        tr.innerHTML = `
          <td class="p-2">${esc(u.user_id)}</td>
          <td class="p-2">${esc(u.name)}</td>
          <td class="p-2">${esc(u.phone)}</td>
          <td class="p-2">₼${Number(u.balance || 0).toFixed(2)}</td>
          <td class="p-2">${esc(u.referral_code)}</td>
          <td class="p-2">${esc(u.referred_by_code || "-")}</td>
          <td class="p-2">${esc(u.register_ip || "-")}</td>
          <td class="p-2">${u.is_banned ? "BAN" : "Aktiv"}</td>
          <td class="p-2">
            <button class="px-2 py-1 rounded text-white ${u.is_banned ? "bg-emerald-600" : "bg-red-600"}"
              onclick="setBan('${esc(u.user_id)}', ${u.is_banned ? "false" : "true"})">
              ${u.is_banned ? "Banı aç" : "Ban"}
            </button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function setBan(uid, banned) {
      await adminSetBan(uid, banned);
      await loadUsers();
    }
  </script>
</body>
</html>
