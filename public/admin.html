<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin panel</title>
  <script src="auth.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4">
  <main class="max-w-5xl mx-auto space-y-4">
    <section class="bg-white p-4 rounded-xl shadow">
      <h1 class="text-2xl font-bold mb-3">Admin giriş</h1>
      <div class="grid md:grid-cols-3 gap-2">
        <input id="adminPhone" class="border rounded p-2" placeholder="+994501112233" />
        <input id="adminPin" class="border rounded p-2" placeholder="PIN" />
        <button id="adminLoginBtn" class="bg-blue-600 text-white rounded p-2">Daxil ol</button>
      </div>
    </section>

    <section class="bg-white p-4 rounded-xl shadow">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-xl font-bold">Yükləmə sorğuları</h2>
        <button id="refreshBtn" class="bg-slate-700 text-white rounded px-3 py-1">Yenilə</button>
      </div>
      <div id="rechargeRequests" class="space-y-3"></div>
    </section>
  </main>

  <script>
    async function adminLoginClick() {
      try {
        const phone = document.getElementById("adminPhone").value.trim();
        const pin = document.getElementById("adminPin").value.trim();
        await adminLogin(phone, pin);
        alert("Admin daxil oldu");
        loadRechargeRequests();
      } catch (e) {
        alert(e.message || "Xeta");
      }
    }

    async function loadRechargeRequests() {
      try {
        const token = getAdminToken();
        if (!token) return;

        const res = await fetch("/.netlify/functions/api/admin/recharge-requests", {
          headers: { Authorization: "Bearer " + token }
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Sorqular gelmedi");

        const box = document.getElementById("rechargeRequests");
        const rows = data.requests || [];

        if (!rows.length) {
          box.innerHTML = `<div class="text-slate-500">Sorğu yoxdur</div>`;
          return;
        }

        box.innerHTML = rows.map(r => `
          <div class="border rounded-xl p-3 bg-slate-50">
            <div><b>ID:</b> ${r.id}</div>
            <div><b>User:</b> ${r.user_id}</div>
            <div><b>Seçilən məbləğ:</b> ${r.amount}</div>
            <div><b>Qəbzdə məbləğ:</b> ${r.paid_amount}</div>
            <div><b>Kanal:</b> ${r.channel}</div>
            <div><b>Status:</b> ${r.status}</div>
            <div class="mt-2">
              <img src="${r.receipt_url}" alt="receipt" class="max-h-52 rounded border" />
            </div>
            <div class="mt-2 flex gap-2 ${r.status === "pending" ? "" : "hidden"}">
              <button onclick="reviewRecharge(${r.id}, 'approve')" class="bg-green-600 text-white rounded px-3 py-1">Approve</button>
              <button onclick="reviewRecharge(${r.id}, 'reject')" class="bg-red-600 text-white rounded px-3 py-1">Reject</button>
            </div>
          </div>
        `).join("");
      } catch (e) {
        alert(e.message || "Xeta");
      }
    }

    async function reviewRecharge(id, action) {
      try {
        const token = getAdminToken();
        const res = await fetch(`/.netlify/functions/api/admin/recharge-requests/${id}`, {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token
          },
          body: JSON.stringify({ action })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Emeliyyat alinmadi");
        alert("Yenilendi");
        loadRechargeRequests();
      } catch (e) {
        alert(e.message || "Xeta");
      }
    }

    document.getElementById("adminLoginBtn").addEventListener("click", adminLoginClick);
    document.getElementById("refreshBtn").addEventListener("click", loadRechargeRequests);

    if (getAdminToken()) loadRechargeRequests();
  </script>
</body>
</html>
