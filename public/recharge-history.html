<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yükləmə Qeydi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #eaf5f2; }
  </style>
</head>
<body>
  <main class="max-w-md mx-auto min-h-screen">
    <header class="bg-green-600 text-white px-4 py-4 flex items-center">
      <a href="my.html" class="text-3xl mr-4">←</a>
      <h1 class="text-3xl font-extrabold mx-auto pr-8">Yükləmə Qeydi</h1>
    </header>

    <section id="list" class="p-4 space-y-4"></section>

    <section id="empty" class="hidden p-6 text-center text-slate-500">
      Hələ yükləmə qeydi yoxdur.
    </section>
  </main>

  <script>
    function formatDate(iso) {
      const d = new Date(iso);
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");
      const ss = String(d.getSeconds()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd} ${hh}:${mi}:${ss}`;
    }

    function loadHistory() {
      const key = "pm_recharge_history";
      let rows = [];
      try { rows = JSON.parse(localStorage.getItem(key) || "[]"); } catch {}

      const list = document.getElementById("list");
      const empty = document.getElementById("empty");

      if (!rows.length) {
        empty.classList.remove("hidden");
        list.innerHTML = "";
        return;
      }

      empty.classList.add("hidden");
      list.innerHTML = rows.map(r => `
        <article class="bg-white rounded-3xl p-5 shadow-sm flex items-center justify-between">
          <div>
            <div class="text-5xl font-extrabold text-slate-800">₼ ${Number(r.amount || 0).toFixed(0)}</div>
            <div class="text-2xl text-slate-500 mt-2">${formatDate(r.createdAt)}</div>
          </div>
          <div class="text-5xl font-extrabold text-yellow-500">${r.status || "Gözləyir"}</div>
        </article>
      `).join("");
    }

    loadHistory();
  </script>
</body>
</html>
