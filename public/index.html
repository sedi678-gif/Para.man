<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para.man | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="auth.js"></script>
</head>
<body class="min-h-screen p-4 text-slate-100" style="background: radial-gradient(1200px 500px at 20% -20%, rgba(16,185,129,.28), transparent 60%), radial-gradient(900px 420px at 85% -20%, rgba(59,130,246,.3), transparent 58%), linear-gradient(160deg,#0f172a,#111827);">
  <main class="w-full max-w-md mx-auto">
    <section class="rounded-3xl overflow-hidden shadow-2xl border border-white/20">
      <div class="relative h-44 w-full overflow-hidden bg-gradient-to-r from-emerald-600 via-green-500 to-lime-500">
        <svg viewBox="0 0 800 220" class="absolute inset-0 h-full w-full opacity-85" aria-hidden="true">
          <defs>
            <pattern id="dollarPattern" width="100" height="70" patternUnits="userSpaceOnUse">
              <text x="8" y="48" font-size="38" fill="#ecfccb" font-weight="800">$</text>
              <text x="52" y="24" font-size="24" fill="#d9f99d" font-weight="700">$</text>
              <text x="70" y="62" font-size="20" fill="#bbf7d0" font-weight="700">$</text>
            </pattern>
          </defs>
          <rect width="800" height="220" fill="url(#dollarPattern)"></rect>
        </svg>
        <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-black/10"></div>
        <div class="absolute bottom-0 left-0 right-0 p-4">
          <p class="text-2xl font-black leading-tight text-yellow-300">
            Dostunu gətir, 20% kəşbek qazan
          </p>
        </div>
      </div>

      <div class="bg-white/10 backdrop-blur-md p-5">
        <h1 class="text-3xl font-extrabold mb-6">Daxil ol</h1>

        <label class="block text-slate-200 text-sm mb-2">Telefon</label>
        <div class="flex mb-4">
          <span class="px-4 flex items-center bg-white border border-r-0 rounded-l-xl text-slate-800 font-semibold">+994</span>
          <input id="phone" type="text" class="w-full border rounded-r-xl p-3 text-black outline-none"
                 placeholder="501234567" maxlength="9" inputmode="numeric" />
        </div>

        <label class="block text-slate-200 text-sm mb-2">Şifrə</label>
        <input id="password" type="password" class="w-full border rounded-xl p-3 mb-4 text-black outline-none"
               placeholder="Şifrə" />

        <button id="loginBtn" class="w-full bg-yellow-400 hover:bg-yellow-300 text-slate-900 rounded-xl py-3 font-bold text-xl transition">
          Daxil ol
        </button>

        <p class="text-slate-200 mt-5 text-sm">
          Hesabın yoxdur? <a href="register.html" class="text-yellow-300 underline">Qeydiyyat</a>
        </p>
      </div>
    </section>
  </main>

  <script>
    // Sessiya varsa logini keç
    (function autoRedirectIfLoggedIn() {
      try {
        const s = getSession();
        if (s?.token) {
          location.replace("home.html");
        }
      } catch (_) {}
    })();

    const phoneInput = document.getElementById("phone");
    phoneInput.addEventListener("input", () => {
      phoneInput.value = phoneInput.value.replace(/\D/g, "").slice(0, 9);
    });

    document.getElementById("loginBtn").addEventListener("click", async () => {
      try {
        const phone = phoneInput.value.trim();
        const password = document.getElementById("password").value;
        if (phone.length !== 9) throw new Error("Telefon 9 reqem olmalidir");
        if (!password) throw new Error("Sifre bosdur");
        await loginUser({ phone, password });
        location.replace("home.html");
      } catch (e) {
        alert(e.message || "Xeta");
      }
    });
  </script>
</body>
</html>
