<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Balans artırma</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="auth.js"></script>
  <style>
    body { background: #f3f4f6; }
  </style>
</head>
<body>
  <main class="max-w-md mx-auto min-h-screen">
    <!-- Top -->
    <section class="bg-gradient-to-r from-cyan-500 to-blue-500 text-white px-4 pt-5 pb-10">
      <a href="my.html" class="text-3xl leading-none">←</a>
      <div class="mt-2">
        <div id="balanceText" class="text-5xl font-extrabold">₼0</div>
        <div class="text-lg opacity-95">Mənim balansım</div>
      </div>
    </section>

    <!-- Card -->
    <section class="-mt-6 bg-white rounded-t-3xl px-4 pt-5 pb-6 shadow">
      <h2 class="text-4xl font-extrabold text-slate-700 mb-3">Yükləmə məbləği</h2>

      <input
        id="amount"
        type="number"
        min="50"
        value="50"
        class="w-full h-14 rounded-2xl border-2 border-sky-500 px-4 text-3xl font-bold mb-3"
      />

      <div class="grid grid-cols-3 gap-2 mb-5">
        <button class="q h-12 rounded-xl bg-slate-100 font-bold text-xl" data-v="50">50</button>
        <button class="q h-12 rounded-xl bg-slate-100 font-bold text-xl" data-v="100">100</button>
        <button class="q h-12 rounded-xl bg-slate-100 font-bold text-xl" data-v="200">200</button>
        <button class="q h-12 rounded-xl bg-slate-100 font-bold text-xl" data-v="500">500</button>
        <button class="q h-12 rounded-xl bg-slate-100 font-bold text-xl" data-v="1000">1000</button>
        <button class="q h-12 rounded-xl bg-slate-100 font-bold text-xl" data-v="2000">2000</button>
      </div>

      <h3 class="text-4xl font-extrabold text-slate-700 mb-3">Yükləmə kanalı</h3>

      <label class="h-14 rounded-2xl border-2 border-sky-500 px-4 flex items-center justify-between bg-slate-50 mb-2 cursor-pointer">
        <span class="text-3xl text-slate-700">Ödəniş-1</span>
        <input type="radio" name="pay_channel" value="payment-1" checked class="w-5 h-5 accent-sky-500" />
      </label>

      <button id="payBtn" class="w-full h-14 rounded-full bg-gradient-to-r from-cyan-500 to-blue-600 text-white text-3xl font-extrabold mb-4">
        İndi yüklə
      </button>

      <div class="rounded-2xl border border-dashed border-slate-300 bg-slate-50 p-4 text-slate-700 leading-7 text-sm">
        <p class="font-bold mb-2">Balans artırma təlimatları:</p>
        <p class="mb-2">1. Balans artırma saatları: saat 10:00-dan 22:00-dək.</p>
        <p class="mb-2">2. Minimum məbləğ artırma: ₼50.</p>
        <p class="mb-2">3. Çatdırılma vaxtı: vəsaitlər adətən 2-30 dəqiqəyə ərzində çatır.</p>
        <p>4. Uğurlu ödənişdən sonra ödəniş qəbzini dərhal yükləyin.</p>
      </div>
    </section>
  </main>

  <script>
    function money(v) { return "₼" + Number(v || 0).toFixed(2); }

    document.querySelectorAll(".q").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.getElementById("amount").value = btn.dataset.v;
      });
    });

    async function init() {
      const s = getSession();
      if (!s?.token) return location.href = "index.html";
      const me = await fetchMe();
      document.getElementById("balanceText").textContent = money(me.balance || 0);
    }

    document.getElementById("payBtn").addEventListener("click", () => {
      const amount = Number(document.getElementById("amount").value || 0);
      const channel = document.querySelector("input[name='pay_channel']:checked")?.value || "payment-1";

      if (amount < 50) {
        alert("Minimum məbləğ ₼50 olmalıdır");
        return;
      }

      localStorage.setItem("pm_pending_recharge", JSON.stringify({
        amount,
        channel,
        createdAt: new Date().toISOString()
      }));

      window.location.href = "recharge-confirm.html";
    });

    init().catch((e) => {
      alert(e.message || "Xəta");
      location.href = "index.html";
    });
  </script>
</body>
</html>
